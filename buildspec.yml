version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR... # echo command is used to print the message to the console output
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 515424600331.dkr.ecr.us-east-1.amazonaws.com # Repository URI for ECR login
      - IMAGE_TAG=latest
  build:
    commands:
      - echo Building the Docker image...
      - docker build --platform linux/amd64 -t calendly .
      - docker tag calendly:latest 515424600331.dkr.ecr.us-east-1.amazonaws.com/calendly:$IMAGE_TAG
  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push 515424600331.dkr.ecr.us-east-1.amazonaws.com/calendly:$IMAGE_TAG
      - echo Build completed successfully.

artifacts:
  files: []